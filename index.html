<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Position Calculator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f0f2f5;
      --surface:      #ffffff;
      --border:       #e2e4e9;
      --text:         #111827;
      --muted:        #6b7280;
      --green:        #16a34a;
      --green-bg:     #f0fdf4;
      --green-border: #86efac;
      --red:          #dc2626;
      --red-bg:       #fff1f2;
      --red-border:   #fecaca;
      --accent:       #3b82f6;
      --accent-bg:    #eff6ff;
      --accent-border:#bfdbfe;
      --radius:       12px;
      --radius-sm:    8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 16px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
    }

    /* ── Header bar ── */
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }

    .card-title {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
    }

/* ── Body padding ── */
    .card-body {
      padding: 20px;
    }

    /* ── Section label ── */
    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 14px;
    }

    /* ── Direction toggle ── */
    .dir-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 18px;
    }

    .dir-btn {
      padding: 11px 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg);
      color: var(--muted);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      letter-spacing: 0.04em;
    }

    .dir-btn.active-long {
      background: var(--green-bg);
      color: var(--green);
      border-color: var(--green-border);
    }

    .dir-btn.active-short {
      background: var(--red-bg);
      color: var(--red);
      border-color: var(--red-border);
    }

    /* ── Field (label above input) ── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 14px;
    }

    .field-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ── Input with stacked steppers ── */
    .input-wrap {
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
      transition: border-color 0.15s;
    }

    .input-wrap:focus-within { border-color: var(--accent); }

    .input-wrap input {
      flex: 1;
      background: var(--surface);
      border: none;
      color: var(--text);
      font-size: 1rem;
      padding: 9px 12px;
      outline: none;
      min-width: 0;
    }

    .steppers {
      display: flex;
      flex-direction: column;
      width: 32px;
      flex-shrink: 0;
      border-left: 1px solid var(--border);
    }

    .step-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 0.55rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
      -webkit-tap-highlight-color: transparent;
      min-height: 22px;
    }

    .step-btn:first-child { border-bottom: 1px solid var(--border); }

    .step-btn:active { background: var(--bg); color: var(--text); }

    /* ── Ticker row (input + spinner) ── */
    .ticker-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .ticker-wrap input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 1rem;
      padding: 9px 32px 9px 12px;
      outline: none;
      text-transform: uppercase;
      transition: border-color 0.15s;
    }

    .ticker-wrap input:focus { border-color: var(--accent); }

    .ticker-clear-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.85rem;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      -webkit-tap-highlight-color: transparent;
    }

    .ticker-clear-btn:hover { color: var(--text); }

    .spinner {
      position: absolute;
      right: 10px;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      pointer-events: none;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Two-column stop/entry grid ── */
    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 14px;
    }

    .two-col .field { margin-bottom: 0; }

    /* ── Auto-stop pill ── */
    .autostop-pill {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border-radius: 20px;
      padding: 2px 8px;
      cursor: pointer;
      border: 1px solid var(--accent-border);
      background: var(--accent-bg);
      color: var(--accent);
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .autostop-pill:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .autostop-pill.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 4px 0 20px;
    }

    /* ── Results section ── */

    .placeholder {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 12px 0 4px;
    }

    /* Shares hero */
    .shares-hero {
      margin-bottom: 16px;
    }

    .shares-number {
      font-size: 3.5rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .shares-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Result rows */
    .result-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .result-row:last-child { border-bottom: none; }

    .result-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
    }

    .result-value {
      font-size: 0.95rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }

    .result-value.positive { color: var(--green); }
    .result-value.negative { color: var(--red); }
    .result-value.accent   { color: var(--accent); }
  </style>
</head>
<body>

<div class="card">

  <!-- Header -->
  <div class="card-header">
    <span class="card-title">Position Sizing Calculator</span>
  </div>

  <div class="card-body">

    <!-- Section label -->
    <div class="section-label">&#9658; Trade Parameters</div>

    <!-- Direction toggle -->
    <div class="dir-toggle">
      <button class="dir-btn" id="btn-long"  onclick="setDirection('long')">&#9650; LONG</button>
      <button class="dir-btn" id="btn-short" onclick="setDirection('short')">&#9660; SHORT</button>
    </div>

    <!-- Ticker -->
    <div class="field">
      <div class="field-label">
        Ticker
        <div class="spinner" id="spinner" style="display:none; position:static; width:12px; height:12px;"></div>
        <span id="load-timer" style="display:none; font-size:0.7rem; color:var(--muted); font-weight:500;"></span>
      </div>
      <div class="ticker-wrap">
        <input
          id="input-ticker"
          type="text"
          placeholder=""
          autocomplete="off"
          autocorrect="off"
          autocapitalize="characters"
          spellcheck="false"
          oninput="onTickerInput(this.value)"
        >
        <button class="ticker-clear-btn" onclick="resetAll()" title="Reset">✕</button>
      </div>
      <p id="ticker-error" style="display:none; font-size:0.72rem; color:var(--red); margin-top:4px;">Ticker not found</p>
    </div>

    <!-- Account Equity -->
    <div class="field">
      <div class="field-label">Account Equity (USD)</div>
      <div class="input-wrap">
        <input
          id="input-equity"
          type="text"
          inputmode="decimal"
          placeholder="40000"
          oninput="onField('accountEquity', this.value)"
        >
      </div>
    </div>

    <!-- Risk % -->
    <div class="field">
      <div class="field-label">Risk Per Trade (%)</div>
      <div class="input-wrap">
        <input
          id="input-risk"
          type="text"
          inputmode="decimal"
          placeholder="0.33"
          oninput="onField('riskPct', this.value)"
        >
        <div class="steppers">
          <button class="step-btn" onclick="step('riskPct', 0.1)">▲</button>
          <button class="step-btn" onclick="step('riskPct', -0.1)">▼</button>
        </div>
      </div>
    </div>

    <!-- Stop Loss + Entry (stacked) -->
    <div>
      <div class="field" style="margin-bottom:14px">
        <div class="field-label">
          Stop Loss ($)
          <button
            class="autostop-pill"
            id="autostop-pill"
            disabled
            onclick="toggleAutoStop()"
          >Day Low</button>
        </div>
        <div class="input-wrap">
          <input
            id="input-stop"
            type="text"
            inputmode="decimal"
            placeholder="0.00"
            oninput="onField('stopLoss', this.value)"
          >
          <div class="steppers">
            <button class="step-btn" onclick="step('stopLoss', 0.1)">▲</button>
            <button class="step-btn" onclick="step('stopLoss', -0.1)">▼</button>
          </div>
        </div>
      </div>

      <div class="field" style="margin-bottom:0">
        <div class="field-label">
          Entry Price ($)
          <button
            class="autostop-pill"
            id="autoentry-pill"
            disabled
            onclick="toggleAutoEntry()"
          >Last</button>
        </div>
        <div class="input-wrap">
          <input
            id="input-entry"
            type="text"
            inputmode="decimal"
            placeholder="0.00"
            oninput="onField('entry', this.value)"
          >
          <div class="steppers">
            <button class="step-btn" onclick="step('entry', 0.1)">▲</button>
            <button class="step-btn" onclick="step('entry', -0.1)">▼</button>
          </div>
        </div>
      </div>
    </div>

    <hr class="divider">

    <!-- Results -->
    <div id="output-section">
      <div class="shares-hero">
        <div class="shares-number" id="out-shares">—</div>
        <div class="shares-label">Shares to Trade</div>
      </div>

      <div class="result-row">
        <span class="result-label">Risk $</span>
        <span class="result-value" id="out-risk">—</span>
      </div>
      <div class="result-row">
        <span class="result-label">% of Capital</span>
        <span class="result-value" id="out-capital-pct">—</span>
      </div>
      <div class="result-row">
        <span class="result-label">Total Position</span>
        <span class="result-value" id="out-total">—</span>
      </div>
      <div class="result-row">
        <span class="result-label">Pivot %</span>
        <span class="result-value" id="out-pivot">—</span>
      </div>
      <div class="result-row" id="card-adr-pct">
        <span class="result-label">ADR %</span>
        <span class="result-value accent" id="out-adr-pct">—</span>
      </div>
      <div class="result-row" id="card-xadr">
        <span class="result-label">xADR</span>
        <span class="result-value accent" id="out-xadr">—</span>
      </div>
      <div class="result-row" id="card-early-stop">
        <span class="result-label">½ Risk Stop</span>
        <span class="result-value" id="out-early-stop">—</span>
      </div>
    </div>

  </div><!-- /card-body -->
</div><!-- /card -->

<script>
  // ── Config ──────────────────────────────────────────────────────────────
  const API_BASE = 'https://position-calculator-api.onrender.com';

  // ── State ────────────────────────────────────────────────────────────────
  const DEFAULT_STATE = {
    direction:     'long',
    accountEquity: '40000',
    riskPct:       '0.33',
    entry:         '',
    stopLoss:      '',
    ticker:        '',
    adrData:       null,
    adrLoading:    false,
    adrError:      false,
    useAutoStop:   false,
    useAutoEntry:  false,
  };

  const state = { ...DEFAULT_STATE };

  function setState(patch) {
    Object.assign(state, patch);
    render();
  }

  // ── Computed ─────────────────────────────────────────────────────────────
  function computeDerived(s) {
    const equity  = parseFloat(s.accountEquity);
    const riskPct = parseFloat(s.riskPct);
    const entry   = parseFloat(s.entry);
    const stop    = parseFloat(s.stopLoss);

    if (!equity || !riskPct || !entry || !stop || isNaN(equity) || isNaN(riskPct) || isNaN(entry) || isNaN(stop)) {
      return null;
    }

    const riskDollars  = equity * (riskPct / 100);
    const riskPerShare = s.direction === 'long' ? entry - stop : stop - entry;

    if (riskPerShare <= 0) return null;

    const quantity    = Math.floor(riskDollars / riskPerShare);
    const totalValue  = quantity * entry;
    const capitalPct  = (totalValue / equity) * 100;
    const pivotPct    = ((stop - entry) / entry) * 100;
    const xADR       = s.adrData && pivotPct !== 0
      ? s.adrData.adr_pct / Math.abs(pivotPct)
      : null;

    const earlyStop = s.direction === 'long'
      ? entry - riskPerShare / 2
      : entry + riskPerShare / 2;

    return { riskDollars, riskPerShare, quantity, totalValue, capitalPct, pivotPct, xADR, earlyStop };
  }

  // ── Render ───────────────────────────────────────────────────────────────
  function render() {
    // Auto-stop sync (mutate state directly — avoid re-entrant setState)
    if (state.useAutoStop && state.adrData) {
      state.stopLoss = state.direction === 'long'
        ? String(state.adrData.day_low)
        : String(state.adrData.day_high);
    }

    // Auto-entry sync
    if (state.useAutoEntry && state.adrData) {
      state.entry = String(state.adrData.current_price);
    }

    const d = computeDerived(state);

    // Direction buttons
    document.getElementById('btn-long').className  = 'dir-btn' + (state.direction === 'long'  ? ' active-long'  : '');
    document.getElementById('btn-short').className = 'dir-btn' + (state.direction === 'short' ? ' active-short' : '');

    // Ticker / spinner / error
    setInputIfNotFocused('input-ticker', state.ticker);
    document.getElementById('spinner').style.display = state.adrLoading ? 'inline-block' : 'none';
    document.getElementById('ticker-error').style.display = state.adrError ? 'block' : 'none';

    // Auto-stop pill
    const pill = document.getElementById('autostop-pill');
    pill.textContent = state.direction === 'long' ? 'Day Low' : 'Day High';
    pill.disabled = !state.adrData;
    pill.className = 'autostop-pill' + (state.useAutoStop ? ' active' : '');

    // Auto-entry pill
    const entryPill = document.getElementById('autoentry-pill');
    entryPill.textContent = 'Last';
    entryPill.disabled = !state.adrData;
    entryPill.className = 'autostop-pill' + (state.useAutoEntry ? ' active' : '');

    // Input fields
    setInputIfNotFocused('input-equity', state.accountEquity);
    setInputIfNotFocused('input-risk',   state.riskPct);
    setInputIfNotFocused('input-entry',  state.entry);
    setInputIfNotFocused('input-stop',   state.stopLoss);

    // Outputs — always visible, show — when not yet computable
    document.getElementById('out-shares').textContent = d ? d.quantity.toLocaleString() : '—';
    document.getElementById('out-risk').textContent   = d ? '$' + fmt(d.riskDollars)    : '—';
    document.getElementById('out-capital-pct').textContent = d ? d.capitalPct.toFixed(1) + '%' : '—';
    document.getElementById('out-total').textContent  = d ? '$' + fmt(d.totalValue)     : '—';

    const pivotEl = document.getElementById('out-pivot');
    if (d) {
      pivotEl.textContent = d.pivotPct.toFixed(2) + '%';
      pivotEl.className   = 'result-value ' + (d.pivotPct < 0 ? 'negative' : 'positive');
    } else {
      pivotEl.textContent = '—';
      pivotEl.className   = 'result-value';
    }

    document.getElementById('out-adr-pct').textContent =
      state.adrData ? state.adrData.adr_pct.toFixed(2) + '%' : '—';

    document.getElementById('out-xadr').textContent =
      (d && d.xADR !== null) ? d.xADR.toFixed(2) + 'x' : '—';

    document.getElementById('out-early-stop').textContent =
      d ? '$' + fmt(d.earlyStop) : '—';
  }

  // ── Helpers ──────────────────────────────────────────────────────────────
  function fmt(n) {
    return n >= 1000
      ? n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })
      : n.toFixed(2);
  }

  function setInputIfNotFocused(id, value) {
    const el = document.getElementById(id);
    if (document.activeElement !== el) el.value = value;
  }

  // ── Event handlers ───────────────────────────────────────────────────────
  function setDirection(dir) {
    setState({ direction: dir, useAutoStop: false, useAutoEntry: false });
  }

  function onField(field, value) {
    setState({ [field]: value });
  }

  function step(field, delta) {
    const current = parseFloat(state[field]) || 0;
    const next = Math.round((current + delta) * 10) / 10;
    setState({ [field]: String(next) });
  }

  function toggleAutoStop() {
    if (!state.adrData) return;
    setState({ useAutoStop: !state.useAutoStop });
  }

  function toggleAutoEntry() {
    if (!state.adrData) return;
    setState({ useAutoEntry: !state.useAutoEntry });
  }

  function resetAll() {
    Object.assign(state, { ...DEFAULT_STATE });
    render();
  }

  // ── ADR fetch ─────────────────────────────────────────────────────────────
  let debounceTimer = null;
  let loadTimerInterval = null;

  function startLoadTimer() {
    const el = document.getElementById('load-timer');
    const start = Date.now();
    el.style.display = 'inline';
    el.textContent = '0s';
    clearInterval(loadTimerInterval);
    loadTimerInterval = setInterval(() => {
      el.textContent = Math.floor((Date.now() - start) / 1000) + 's';
    }, 1000);
  }

  function stopLoadTimer() {
    clearInterval(loadTimerInterval);
    const el = document.getElementById('load-timer');
    el.style.display = 'none';
    el.textContent = '';
  }

  function onTickerInput(value) {
    stopLoadTimer();
    setState({ ticker: value, adrData: null, adrLoading: false, adrError: false, useAutoStop: false, useAutoEntry: false });
    clearTimeout(debounceTimer);
    if (!value.trim()) return;
    setState({ adrLoading: true });
    debounceTimer = setTimeout(() => fetchADR(value.trim()), 400);
  }

  async function fetchADR(ticker) {
    startLoadTimer();
    try {
      const res = await fetch(`${API_BASE}/api/adr/${encodeURIComponent(ticker)}`);
      stopLoadTimer();
      if (!res.ok) {
        setState({ adrData: null, adrLoading: false, adrError: true });
        return;
      }
      const data = await res.json();
      setState({ adrData: data, adrLoading: false, adrError: false });
    } catch {
      stopLoadTimer();
      setState({ adrData: null, adrLoading: false, adrError: true });
    }
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  render();
  fetch(`${API_BASE}/api/adr/SPY`).catch(() => {}); // warm up Render on page load
</script>
</body>
</html>
